<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>To Do App | Support</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="./">
          <img src="./images/logo.png" height="50px" width="auto" />
        </a>

        <!-- Hamburger menu button (visible on smaller screens) -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <img
            src="./Images/Hamburger.svg"
            alt="hamburger icon"
            height="40px"
            width="auto"
          />
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-lg-auto text-center text-lg-start">
            <li class="nav-item">
              <a class="nav-link" href="./features.html">Features</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="./pricing.html">Pricing</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="./support.html">Support</a>
            </li>

            <!-- Button nav items -->
            <li class="nav-item d-block d-lg-none">
              <a class="nav-link" href="./login.html">Login</a>
            </li>

            <li class="nav-item d-block d-lg-none">
              <a class="nav-link" href="./signup.html">Signup</a>
            </li>
          </ul>

          <!-- Buttons only visible on large screens -->
          <div class="d-flex gap-2 d-none d-lg-block ms-3">
            <a class="btn btn-primary" href="./login.html">Login</a>
            <a class="btn btn-outline-light" href="./signup.html">Signup</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Support Hero -->
    <section class="bg-img py-5">
      <div class="container text-center text-white py-4">
        <h1 class="fw-bold mb-3">Support</h1>
        <p class="lead mb-0">
          We're here to help. Send us a message and we'll get back to you.
        </p>
      </div>
    </section>

    <!-- Support Form -->
    <section class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm border-0 p-4">
              <form>
                <div class="mb-3">
                  <label for="supportName" class="form-label fw-semibold"
                    >Name</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="supportName"
                    placeholder="Your name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="supportEmail" class="form-label fw-semibold"
                    >Email</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="supportEmail"
                    placeholder="your@email.com"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="supportSubject" class="form-label fw-semibold"
                    >Subject</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="supportSubject"
                    placeholder="What's this about?"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label for="supportMessage" class="form-label fw-semibold"
                    >Message</label
                  >
                  <textarea
                    class="form-control"
                    id="supportMessage"
                    rows="5"
                    placeholder="Describe your issue..."
                    required
                  ></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Send Message
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ↓ Footer ↓ -->

    <footer>
      <div class="py-5 container">
        <div
          class="d-flex justify-content-between flex-column gap-5 gap-md-0 flex-md-row align-items-center px-3 mb-5"
        >
          <a href="./">
            <img
              src="./Images/logo.png"
              alt="logo"
              height="100px"
              width="auto"
            />
          </a>
          <div class="col-12 col-sm-8 col-md-7 col-lg-5 col-xl-4">
            <h3 class="text-white mb-3 text-center text-md-start">
              Subscribe to our Newsletter
            </h3>
            <div class="input-group">
              <input
                placeholder="Enter your email"
                type="email"
                class="form-control"
              />
              <button class="btn btn-primary">Subscribe</button>
            </div>
          </div>
        </div>
        <div
          class="d-flex justify-content-center flex-column gap-3 flex-md-row align-items-center"
        >
          <a class="nav-link" href="/frontend/privacy-policy.html"
            >Privacy Policy</a
          >
          <p class="m-0 d-none d-md-block">|</p>
          <a class="nav-link" href="/frontend/tos.html">Terms of Service</a>
          <p class="mb-0 me-3 d-none d-md-block">|</p>
          <p class="m-0">TaskIt 2026 All Rights Reserved</p>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
